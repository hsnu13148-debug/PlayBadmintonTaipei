name: court-watch

on:
  schedule:
    - cron: '*/15 * * * *'   # GitHub 內建排程（不準時，當備援）
  workflow_dispatch:          # 由 cron-job.org 外部觸發（每 5 分鐘，準時）
    inputs:
      force:
        description: '強制執行（無視安靜時段與隨機間隔）'
        type: boolean
        default: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 用 cache 保存上次的空位狀態與掃描時間，避免重複通知（不額外產生 commit）
      - name: Restore watch state
        uses: actions/cache@v4
        with:
          path: state.json
          key: watch-state-${{ github.run_id }}
          restore-keys: |
            watch-state-

      - name: Scan and notify
        run: node scripts/notify.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_RUN: ${{ inputs.force == true && '1' || '' }}
