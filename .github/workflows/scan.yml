name: court-watch

on:
  schedule:
    - cron: '*/5 * * * *'    # 每 5 分鐘醒來；實際掃描間隔由 notify.js 隨機決定（5–15 分）
  workflow_dispatch:          # 手動觸發（無視安靜時段與間隔限制）

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 用 cache 保存上次的空位狀態與掃描時間，避免重複通知（不額外產生 commit）
      - name: Restore watch state
        uses: actions/cache@v4
        with:
          path: state.json
          key: watch-state-${{ github.run_id }}
          restore-keys: |
            watch-state-

      - name: Scan and notify
        run: node scripts/notify.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
